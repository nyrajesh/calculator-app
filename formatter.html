<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Text Formatter</title>
    <!-- Library: Compromise.js -->
    <script src="https://unpkg.com/compromise@latest/builds/compromise.min.js"></script>
    <style>
        :root {
            --primary: #2563eb;
            --success: #059669;
            --error: #dc2626;
            --bg: #f1f5f9;
            --border: #cbd5e1;
            --text: #1e293b;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 1100px;
            background: white;
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }

        header { text-align: center; margin-bottom: 2rem; }
        header h1 { margin: 0; color: var(--primary); font-size: 1.75rem; }

        /* The Grid Layout */
        .workspace {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            gap: 20px;
        }

        .column { display: flex; flex-direction: column; gap: 8px; }
        label { font-weight: 600; font-size: 0.85rem; color: #64748b; text-transform: uppercase; }

        textarea {
            width: 100%;
            height: 350px;
            padding: 1rem;
            border: 1px solid var(--border);
            border-radius: 0.75rem;
            font-size: 1rem;
            line-height: 1.6;
            resize: none;
            box-sizing: border-box;
            outline: none;
            transition: all 0.2s;
        }

        textarea:focus { border-color: var(--primary); ring: 3px rgba(37, 99, 235, 0.1); }

        /* The Middle Arrow Button */
        .arrow-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .btn-generate {
            background: var(--primary);
            color: white;
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s, background 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .btn-generate:hover { 
            background: #1d4ed8; 
            transform: scale(1.1);
        }

        .btn-generate:active { transform: scale(0.95); }

        /* Status Area */
        .status-box {
            margin-top: 2rem;
            padding: 1rem;
            border-radius: 0.5rem;
            background: #f8fafc;
            border: 1px solid var(--border);
            text-align: center;
            min-height: 24px;
        }

        .status-text { font-weight: 500; font-size: 0.95rem; }
        .success { color: var(--success); }
        .error { color: var(--error); }
        .neutral { color: #64748b; }

        .copy-area {
            display: flex;
            justify-content: center;
            margin-top: 15px;
        }

        .btn-copy {
            padding: 10px 20px;
            background: white;
            border: 1px solid var(--border);
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
        }

        .btn-copy:hover { background: #f1f5f9; }

        /* Responsive Mobile Layout */
        @media (max-width: 768px) {
            .workspace { grid-template-columns: 1fr; }
            .arrow-container { transform: rotate(90deg); margin: 10px 0; align-items: center; }
            textarea { height: 200px; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Smart Text Formatter</h1>
    </header>

    <div class="workspace">
        <!-- LEFT PANE -->
        <div class="column">
            <label>Raw Input</label>
            <textarea id="input-text" placeholder="i live in paris. it's beautiful."></textarea>
        </div>

        <!-- CENTER ARROW -->
        <div class="arrow-container">
            <button class="btn-generate" onclick="processText()" title="Click to Format">
                ➔
            </button>
        </div>

        <!-- RIGHT PANE -->
        <div class="column">
            <label>Formatted Result</label>
            <textarea id="output-text" readonly placeholder="Result will appear here..."></textarea>
        </div>
    </div>

    <div class="copy-area">
        <button class="btn-copy" onclick="copyResult()">Copy Result to Clipboard</button>
    </div>

    <!-- BOTTOM STATUS AREA -->
    <div class="status-box">
        <span id="status-msg" class="status-text neutral">System Ready</span>
    </div>
</div>

<script>
    const statusEl = document.getElementById('status-msg');
    const inputEl = document.getElementById('input-text');
    const outputEl = document.getElementById('output-text');

    function updateStatus(msg, type) {
        statusEl.innerText = msg;
        statusEl.className = 'status-text ' + type;
    }

    function processText() {
        const text = inputEl.value.trim();

        // 1. Validation
        if (!text) {
            updateStatus("⚠️ Error: Please enter some text first.", "error");
            return;
        }

        // 2. Library Check
        if (typeof nlp === 'undefined') {
            updateStatus("⏳ Error: Library still loading. Try again in 2 seconds.", "error");
            return;
        }

        try {
            updateStatus("⚙️ Processing...", "neutral");
            
            // 3. Transformation Logic
            let doc = nlp(text);
            
            doc.sentences().capitalize(); // Capitalize starts of sentences
            doc.normalize();              // Fix whitespace and punctuation
            
            let result = doc.text();

            // Force a period at the end if missing
            if (result && !/[.!?]$/.test(result)) {
                result += ".";
            }

            outputEl.value = result;
            updateStatus("✅ Success: Text formatted and grammar improved!", "success");
        } catch (err) {
            console.error(err);
            updateStatus("❌ Critical Error: Failed to process text.", "error");
        }
    }

    function copyResult() {
        if (!outputEl.value) {
            updateStatus("⚠️ Nothing to copy!", "error");
            return;
        }
        navigator.clipboard.writeText(outputEl.value).then(() => {
            const oldMsg = statusEl.innerText;
            const oldClass = statusEl.className;
            
            updateStatus("📋 Copied to clipboard!", "success");
            
            // Revert status after 2 seconds
            setTimeout(() => {
                statusEl.innerText = oldMsg;
                statusEl.className = oldClass;
            }, 2000);
        });
    }
</script>

</body>
</html>
