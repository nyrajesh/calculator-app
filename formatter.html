<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Smart Formatter (Local LLM)</title>
    <style>
        :root { --primary: #2563eb; --secondary: #7c3aed; --bg: #f8fafc; --text: #1e293b; --border: #cbd5e1; }
        body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; justify-content: center; min-height: 100vh; }
        .container { width: 100%; max-width: 1100px; background: white; padding: 2rem; border-radius: 1.5rem; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); }
        
        .header { text-align: center; margin-bottom: 2rem; }
        .header h1 { margin: 0; color: var(--primary); }
        
        /* Model Loader UI */
        #loader { background: #eff6ff; padding: 15px; border-radius: 10px; margin-bottom: 20px; text-align: center; border: 1px solid #bfdbfe; }
        .progress-container { width: 100%; background: #d1d5db; height: 10px; border-radius: 5px; margin-top: 10px; overflow: hidden; display: none; }
        #progress-bar { width: 0%; height: 100%; background: var(--primary); transition: width 0.3s; }

        .workspace { display: grid; grid-template-columns: 1fr auto 1fr; gap: 20px; align-items: center; }
        textarea { width: 100%; height: 350px; padding: 1.2rem; border: 2px solid var(--border); border-radius: 1rem; font-size: 1rem; resize: none; box-sizing: border-box; outline: none; }
        textarea:focus { border-color: var(--primary); }

        .btn-gen { background: var(--primary); color: white; border: none; width: 60px; height: 60px; border-radius: 50%; cursor: pointer; font-size: 1.8rem; box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.4); }
        .btn-gen:disabled { background: #cbd5e1; cursor: not-allowed; }

        .controls { display: flex; justify-content: center; gap: 15px; margin-top: 20px; }
        button.action-btn { padding: 12px 24px; border-radius: 10px; border: none; font-weight: 600; cursor: pointer; color: white; transition: 0.2s; }
        .btn-ai { background: var(--secondary); }
        .btn-ai:disabled { opacity: 0.5; }
        .btn-copy { background: #64748b; }

        @media (max-width: 800px) { .workspace { grid-template-columns: 1fr; } .btn-gen { transform: rotate(90deg); margin: 10px auto; } }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>AI Smart Formatter</h1>
        <p>Running a Local LLM (T5) inside your browser</p>
    </div>

    <!-- Loading UI -->
    <div id="loader">
        <span id="status-text">Checking AI Model...</span>
        <div class="progress-container" id="progress-cont">
            <div id="progress-bar"></div>
        </div>
    </div>
    
    <div class="workspace">
        <textarea id="input" placeholder="Enter text to paraphrase..."></textarea>
        <button id="btn-fix" class="btn-gen" onclick="basicFix()" title="Fast Fix">➔</button>
        <textarea id="output" readonly placeholder="AI Result..."></textarea>
    </div>

    <div class="controls">
        <button id="btn-ai" class="action-btn btn-ai" onclick="paraphraseAI()" disabled>
            ✨ AI Paraphrase (Local LLM)
        </button>
        <button class="action-btn btn-copy" onclick="copyText()">📋 Copy Result</button>
    </div>
</div>

<!-- Import Transformers.js as a Module -->
<script type="module">
    import { pipeline } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.1';

    let paraphraser;
    const statusText = document.getElementById('status-text');
    const progressBar = document.getElementById('progress-bar');
    const progressCont = document.getElementById('progress-cont');
    const aiBtn = document.getElementById('btn-ai');

    async function initAI() {
        try {
            statusText.innerText = "Initializing AI Engine (First time takes 1-2 mins)...";
            progressCont.style.display = "block";

            // Initialize the paraphrasing pipeline with T5-small
            paraphraser = await pipeline('text2text-generation', 'Xenova/t5-small', {
                progress_callback: (data) => {
                    if (data.status === 'progress') {
                        progressBar.style.width = `${data.progress}%`;
                    }
                }
            });

            statusText.innerText = "✅ AI Engine Ready (Offline Mode)";
            aiBtn.disabled = false;
            setTimeout(() => { document.getElementById('loader').style.display = 'none'; }, 3000);
        } catch (e) {
            statusText.innerText = "❌ Error loading AI. Try refreshing.";
            console.error(e);
        }
    }

    // Attach function to window so the buttons can see it
    window.paraphraseAI = async function() {
        const input = document.getElementById('input').value;
        if (!input) return;

        aiBtn.disabled = true;
        aiBtn.innerText = "🤖 Thinking...";
        
        try {
            // "paraphrase: " is a specific prompt prefix for the T5 model
            const output = await paraphraser(`paraphrase: ${input}`, {
                max_new_tokens: 128,
                repetition_penalty: 2.0,
                no_repeat_ngram_size: 3,
            });

            document.getElementById('output').value = output[0].generated_text;
            statusText.innerText = "✨ AI Paraphrasing Complete";
        } catch (e) {
            alert("AI Error: " + e.message);
        }
        
        aiBtn.disabled = false;
        aiBtn.innerText = "✨ AI Paraphrase (Local LLM)";
    }

    // Load AI on page load
    initApp();
    async function initApp() {
        await initAI();
    }
</script>

<script>
    // Traditional fast cleanup (Non-AI)
    function basicFix() {
        let text = document.getElementById('input').value;
        text = text.trim().replace(/\s+/g, ' ');
        text = text.charAt(0).toUpperCase() + text.slice(1);
        text = text.replace(/\bi\b/g, 'I');
        text = text.replace(/([.!?]\s+)([a-z])/g, (m, s, l) => s + l.toUpperCase());
        if (text && !/[.!?]$/.test(text)) text += ".";
        document.getElementById('output').value = text;
    }

    function copyText() {
        const out = document.getElementById('output');
        navigator.clipboard.writeText(out.value);
        alert("Copied!");
    }
</script>

</body>
</html>
