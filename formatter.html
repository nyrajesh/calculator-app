<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Precision Text Fixer</title>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --text: #1e293b; --border: #cbd5e1; }
        body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; justify-content: center; min-height: 100vh; }
        .container { width: 100%; max-width: 1000px; background: white; padding: 2rem; border-radius: 1.5rem; box-shadow: 0 15px 30px rgba(0,0,0,0.05); }
        
        header { text-align: center; margin-bottom: 20px; }
        header h1 { margin: 0; color: var(--primary); font-size: 1.5rem; letter-spacing: -0.01em; }
        header p { color: #64748b; font-size: 0.9rem; margin-top: 5px; }

        #status-area { background: #f1f5f9; padding: 12px; border-radius: 10px; margin-bottom: 20px; text-align: center; font-size: 0.85rem; border: 1px solid var(--border); }
        .loader-bar { width: 100%; background: #e2e8f0; height: 6px; border-radius: 3px; margin-top: 8px; overflow: hidden; display: none; }
        #progress { width: 0%; height: 100%; background: var(--primary); transition: width 0.3s; }

        .workspace { display: grid; grid-template-columns: 1fr auto 1fr; gap: 20px; align-items: center; }
        textarea { width: 100%; height: 300px; padding: 1.2rem; border: 1.5px solid var(--border); border-radius: 1rem; font-size: 1rem; line-height: 1.6; resize: none; box-sizing: border-box; outline: none; transition: 0.2s; }
        textarea:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.05); }

        .btn-main {
            background: #94a3b8; color: white; border: none; width: 60px; height: 60px; border-radius: 50%;
            cursor: not-allowed; font-size: 1.5rem; display: flex; align-items: center; justify-content: center;
            transition: all 0.3s;
        }
        .btn-main.ready { background: var(--primary); cursor: pointer; }
        .btn-main.loading { animation: spin 2s linear infinite; opacity: 0.6; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .summary-card {
            margin-top: 25px; padding: 20px; background: #fff; border: 1px solid var(--border); border-radius: 1rem;
            display: none; grid-template-columns: repeat(3, 1fr); gap: 15px;
        }
        .stat-item { text-align: center; padding: 10px; border-right: 1px solid #f1f5f9; }
        .stat-item:last-child { border-right: none; }
        .stat-value { display: block; font-size: 1.4rem; font-weight: 700; color: var(--text); }
        .stat-label { font-size: 0.7rem; text-transform: uppercase; color: #94a3b8; font-weight: 700; letter-spacing: 0.05em; }
        .change-log { grid-column: 1 / -1; margin-top: 10px; padding: 12px; background: #f8fafc; border-radius: 8px; font-size: 0.85rem; color: #475569; border-left: 4px solid var(--primary); }

        .controls { text-align: center; margin-top: 20px; }
        .btn-copy { padding: 10px 25px; background: #1e293b; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; }

        @media (max-width: 800px) { .workspace { grid-template-columns: 1fr; } .btn-main { transform: rotate(90deg); margin: 5px auto; } .summary-card { grid-template-columns: 1fr; } .stat-item { border-right: none; border-bottom: 1px solid #f1f5f9; } }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Precision Fixer</h1>
        <p>Grammar & Spelling Correction • Retains Original Tone</p>
    </header>

    <div id="status-area">
        <span id="status-text">⏳ Loading Engine...</span>
        <div class="loader-bar" id="loader-bar"><div id="progress"></div></div>
    </div>

    <div class="workspace">
        <textarea id="input" placeholder="Enter text to fix..."></textarea>
        <button id="main-btn" class="btn-main" onclick="processText()" disabled>➔</button>
        <textarea id="output" readonly placeholder="Fixed text will appear here..."></textarea>
    </div>

    <div id="summary" class="summary-card">
        <div class="stat-item">
            <span class="stat-value" id="count-grammar">0</span>
            <span class="stat-label">Grammar Fixes</span>
        </div>
        <div class="stat-item">
            <span class="stat-value" id="count-punct">0</span>
            <span class="stat-label">Punctuations</span>
        </div>
        <div class="stat-item">
            <span class="stat-value" id="count-spell">0</span>
            <span class="stat-label">Spelling</span>
        </div>
        <div class="change-log" id="change-summary"></div>
    </div>

    <div class="controls">
        <button class="btn-copy" onclick="copyResult()">Copy Result</button>
    </div>
</div>

<script type="module">
    import { pipeline } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.1';

    let generator;
    const btn = document.getElementById('main-btn');
    const statusText = document.getElementById('status-text');
    const progress = document.getElementById('progress');
    const loaderBar = document.getElementById('loader-bar');

    async function init() {
        try {
            loaderBar.style.display = 'block';
            generator = await pipeline('text2text-generation', 'Xenova/LaMini-Flan-T5-77M', {
                progress_callback: (p) => { if (p.status === 'progress') progress.style.width = p.progress + '%'; }
            });
            statusText.innerText = "✅ AI Ready (Offline Mode)";
            btn.classList.add('ready'); btn.disabled = false;
            loaderBar.style.display = 'none';
        } catch (e) { statusText.innerText = "❌ Engine Load Error."; }
    }

    window.processText = async function() {
        const inputVal = document.getElementById('input').value.trim();
        if (!inputVal) return;

        btn.classList.add('loading');
        statusText.innerText = "🔍 Correcting...";

        try {
            // Updated Prompt: Focuses strictly on fixing errors, not "upgrading" language
            const prompt = `Fix grammar and spelling mistakes in this text. Do not change the tone or make it longer: ${inputVal}`;
            
            const result = await generator(prompt, {
                max_new_tokens: inputVal.split(' ').length + 10, // Restrict length growth
                do_sample: false,  // Set to false for most accurate, non-paraphrased correction
                temperature: 0.1,  // Very low temperature keeps the tone original
                repetition_penalty: 1.2
            });

            let outVal = result[0].generated_text.replace(/^(fixed text|result|output):\s*/i, "").trim();
            
            // Minor polish (Capitalization & Period)
            outVal = outVal.charAt(0).toUpperCase() + outVal.slice(1);
            if (outVal && !/[.!?]$/.test(outVal) && /[.!?]$/.test(inputVal)) outVal += ".";

            document.getElementById('output').value = outVal;
            analyzeChanges(inputVal, outVal);
            
            statusText.innerText = "✨ Corrections Applied";
        } catch (e) { statusText.innerText = "❌ Error processing text."; }

        btn.classList.remove('loading');
    };

    function analyzeChanges(orig, mod) {
        // Punctuation Detection
        const punct = /[.,!?;:]/g;
        const oP = (orig.match(punct) || []).length;
        const mP = (mod.match(punct) || []).length;
        const punctDiff = Math.abs(mP - oP);

        // Spelling / Case Detection
        let spellCount = 0;
        const oWords = orig.split(/\s+/);
        const mWords = mod.split(/\s+/);
        oWords.forEach((word, i) => {
            if (mWords[i] && word.toLowerCase() === mWords[i].toLowerCase() && word !== mWords[i]) spellCount++;
            if (mWords[i] && word.length === mWords[i].length && word.toLowerCase() !== mWords[i].toLowerCase()) spellCount++;
        });

        // Grammar Detection (Word count or structural shifts)
        const grammarCount = Math.abs(mWords.length - oWords.length);

        document.getElementById('count-grammar').innerText = grammarCount;
        document.getElementById('count-punct').innerText = punctDiff;
        document.getElementById('count-spell').innerText = spellCount;

        // Change Summary
        let summary = "The text was corrected for errors while maintaining its original length and tone.";
        if (grammarCount === 0 && punctDiff === 0 && spellCount === 0) {
            summary = "No errors were found. The original text was already correct.";
        } else if (grammarCount > 2) {
            summary = "Sentence structure was slightly adjusted to improve grammatical flow.";
        }

        document.getElementById('change-summary').innerHTML = `<strong>Summary:</strong> ${summary}`;
        document.getElementById('summary').style.display = 'grid';
    }

    init();
</script>

<script>
    function copyResult() {
        const out = document.getElementById('output');
        navigator.clipboard.writeText(out.value);
        const btn = document.querySelector('.btn-copy');
        btn.innerText = "Copied!";
        setTimeout(() => btn.innerText = "Copy Result", 2000);
    }
</script>

</body>
</html>
