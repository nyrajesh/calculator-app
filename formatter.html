<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Formatter</title>
    <style>
        :root { --primary: #2563eb; --bg: #f1f5f9; --text: #1e293b; --border: #cbd5e1; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .container { width: 100%; max-width: 1000px; background: white; padding: 2rem; border-radius: 1rem; box-shadow: 0 10px 15px rgba(0,0,0,0.1); }
        header { text-align: center; margin-bottom: 20px; }
        .workspace { display: grid; grid-template-columns: 1fr auto 1fr; gap: 20px; align-items: center; }
        textarea { width: 100%; height: 300px; padding: 15px; border: 1px solid var(--border); border-radius: 10px; font-size: 1rem; box-sizing: border-box; }
        .btn-generate { background: #94a3b8; color: white; border: none; width: 50px; height: 50px; border-radius: 50%; cursor: not-allowed; font-size: 1.5rem; transition: 0.3s; }
        .btn-generate.ready { background: var(--primary); cursor: pointer; }
        .status-box { margin-top: 20px; padding: 10px; background: #f8fafc; border: 1px solid var(--border); border-radius: 8px; text-align: center; font-size: 0.9rem; font-weight: bold; }
        .copy-btn { margin-top: 10px; padding: 8px 16px; cursor: pointer; }
        @media (max-width: 768px) { .workspace { grid-template-columns: 1fr; } .btn-generate { transform: rotate(90deg); margin: auto; } }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Smart Text Formatter</h1>
        <p>Offline Mode (GitHub Hosted)</p>
    </header>

    <div class="workspace">
        <textarea id="input-text" placeholder="Enter text here..."></textarea>
        
        <button id="gen-btn" class="btn-generate" onclick="processText()">➔</button>
        
        <textarea id="output-text" readonly placeholder="Result..."></textarea>
    </div>

    <div style="text-align: center;">
        <button class="copy-btn" onclick="copyResult()">Copy Result</button>
    </div>

    <div class="status-box" id="status-msg">
        ⏳ Checking local files...
    </div>
</div>

<!-- JS IS AT THE BOTTOM SO THE PAGE RENDERS FIRST -->
<script>
    const statusEl = document.getElementById('status-msg');
    const genBtn = document.getElementById('gen-btn');

    // Function to update status
    function updateStatus(msg, color) {
        statusEl.innerText = msg;
        statusEl.style.color = color;
    }

    // Function to run when library is ready
    function initApp() {
        console.log("Library loaded!");
        genBtn.classList.add('ready');
        updateStatus("✅ System Ready: Local Library Loaded", "green");
    }

    // Function to run if library fails
    function handleLibraryError() {
        console.error("File not found");
        updateStatus("❌ Error: 'compromise.min.js' not found in repo. Check filename case!", "red");
    }

    function processText() {
        if (!genBtn.classList.contains('ready')) return;
        
        const input = document.getElementById('input-text').value;
        if (!input.trim()) {
            updateStatus("⚠️ Please enter text", "orange");
            return;
        }

        try {
            let doc = nlp(input);
            doc.sentences().capitalize();
            doc.normalize();
            document.getElementById('output-text').value = doc.text();
            updateStatus("✅ Success!", "green");
        } catch (e) {
            updateStatus("❌ Processing Error", "red");
        }
    }

    function copyResult() {
        const out = document.getElementById('output-text').value;
        if (out) {
            navigator.clipboard.writeText(out);
            updateStatus("📋 Copied!", "blue");
        }
    }
</script>

<!-- THE LIBRARY LOAD - Pointing to your local file -->
<script src="compromise.min.js" onload="initApp()" onerror="handleLibraryError()"></script>

</body>
</html>
