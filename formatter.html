<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Text Formatter</title>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --text: #1e293b;
            --border: #cbd5e1;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 900px;
            background: white;
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .workspace {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            gap: 20px;
            align-items: center;
            margin: 20px 0;
        }

        textarea {
            width: 100%;
            height: 300px;
            padding: 15px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 1rem;
            line-height: 1.6;
            resize: none;
            box-sizing: border-box;
            outline: none;
        }

        textarea:focus { border-color: var(--primary); }

        .btn-gen {
            background: var(--primary);
            color: white;
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }

        .btn-gen:hover { transform: scale(1.1); background: #1d4ed8; }

        .status-bar {
            padding: 12px;
            background: #f1f5f9;
            border-radius: 6px;
            text-align: center;
            font-size: 0.9rem;
            font-weight: 600;
            color: #475569;
        }

        .controls { text-align: center; margin-top: 15px; }

        .btn-copy {
            padding: 10px 20px;
            background: white;
            border: 1px solid var(--border);
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
        }

        @media (max-width: 700px) {
            .workspace { grid-template-columns: 1fr; }
            .btn-gen { transform: rotate(90deg); margin: 10px auto; }
        }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align:center; margin:0; color: var(--primary);">Text Formatter</h2>
    <p style="text-align:center; margin-top:5px; color:#64748b;">Clean and Professional Punctuation</p>
    
    <div class="workspace">
        <textarea id="input" placeholder="type lowercase text here... (e.g. i live in paris. it's great)"></textarea>
        
        <button id="btn" class="btn-gen" onclick="formatText()">➔</button>
        
        <textarea id="output" readonly placeholder="Result..."></textarea>
    </div>

    <div class="controls">
        <button class="btn-copy" onclick="copyText()">Copy to Clipboard</button>
    </div>

    <p class="status-bar" id="status">System Ready (Pure JS Mode)</p>
</div>

<script>
    function formatText() {
        const input = document.getElementById('input').value;
        const status = document.getElementById('status');
        
        if (!input.trim()) {
            status.innerText = "⚠️ Please enter some text first.";
            status.style.color = "orange";
            return;
        }

        try {
            let text = input;

            // 1. Fix double spaces and trim
            text = text.replace(/\s+/g, ' ').trim();

            // 2. Capitalize the first letter of the entire block
            text = text.charAt(0).toUpperCase() + text.slice(1);

            // 3. Capitalize the first letter of every sentence
            // Looks for a period, exclamation, or question mark followed by a space and a letter
            text = text.replace(/([.!?]\s+)([a-z])/g, function(match, separator, letter) {
                return separator + letter.toUpperCase();
            });

            // 4. Fix lowercase "i" (e.g., "i am" -> "I am")
            // \bi\b ensures we only change the word "i", not the "i" inside "like"
            text = text.replace(/\bi\b/g, 'I');

            // 5. Fix spacing around punctuation
            text = text.replace(/\s+([.,!?])/g, '$1'); // "hello ." -> "hello."

            // 6. Ensure the text ends with a period if it doesn't have punctuation
            if (!/[.!?]$/.test(text)) {
                text += ".";
            }

            document.getElementById('output').value = text;
            status.innerText = "✅ Formatting Successful!";
            status.style.color = "green";

        } catch (error) {
            status.innerText = "❌ Error: " + error.message;
            status.style.color = "red";
        }
    }

    function copyText() {
        const output = document.getElementById('output').value;
        const status = document.getElementById('status');
        if (!output) return;

        navigator.clipboard.writeText(output).then(() => {
            status.innerText = "📋 Copied to clipboard!";
            setTimeout(() => {
                status.innerText = "System Ready (Pure JS Mode)";
                status.style.color = "#475569";
            }, 2000);
        });
    }
</script>

</body>
</html>
