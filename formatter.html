<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Text Formatter</title>
    
    <!-- Link to the file you just uploaded to your repo -->
    <script 
        src="compromise.min.js" 
        onload="initApp()" 
        onerror="handleLibraryError()">

    <style>
        :root {
            --primary: #2563eb;
            --success: #059669;
            --error: #dc2626;
            --bg: #f1f5f9;
            --border: #cbd5e1;
            --text: #1e293b;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 1100px;
            background: white;
            padding: 2.5rem;
            border-radius: 1.25rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }

        header { text-align: center; margin-bottom: 2rem; }
        header h1 { margin: 0; color: var(--primary); font-size: 1.8rem; letter-spacing: -0.025em; }
        header p { color: #64748b; margin-top: 0.5rem; font-size: 0.95rem; }

        .workspace {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            gap: 24px;
        }

        .column { display: flex; flex-direction: column; gap: 10px; }
        label { font-weight: 700; font-size: 0.75rem; color: #475569; text-transform: uppercase; letter-spacing: 0.05em; }

        textarea {
            width: 100%;
            height: 380px;
            padding: 1.25rem;
            border: 1px solid var(--border);
            border-radius: 0.75rem;
            font-size: 1.05rem;
            line-height: 1.6;
            resize: none;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            background: #ffffff;
        }

        textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
        }

        textarea[readonly] { background-color: #f8fafc; color: #334155; }

        .arrow-container { display: flex; flex-direction: column; align-items: center; }
